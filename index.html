<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu App de Rotas Escolar</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>

    <!-- Leaflet Routing Machine CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <!-- Leaflet Routing Machine JS -->
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map"></div>

    <div class="sidebar">
        <h1>Meu App de Rotas</h1>
        <div id="inputs-container">
            <div class="input-group">
                <label for="origin-input">Origem:</label>
                <input type="text" id="origin-input" placeholder="Digite o endereço de origem ou CEP">
                <div id="origin-autocomplete" class="autocomplete-results"></div>
            </div>
            <div class="input-group">
                <label for="destination-input">Destino:</label>
                <input type="text" id="destination-input" placeholder="Digite o endereço de destino ou CEP">
                <div id="destination-autocomplete" class="autocomplete-results"></div>
            </div>
        </div>
        <button id="add-stop">Adicionar Parada</button>
        <button id="calculate-route">Calcular Rota</button>

        <div id="route-details">
            <h2>Detalhes da Rota:</h2>
            <p>Distância: <span id="total-distance"></span></p>
            <p>Tempo Estimado: <span id="total-time"></span></p>
            <h3>Instruções:</h3>
            <div id="turn-by-turn-instructions"></div>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="app.js"></script>
</body>
</html>
